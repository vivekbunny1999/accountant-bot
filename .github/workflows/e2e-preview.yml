name: E2E Preview QA

on:
  pull_request:

permissions:
  contents: read

jobs:
  e2e-preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && secrets.E2E_BASE_URL != '' && secrets.E2E_TEST_EMAIL != '' && secrets.E2E_TEST_PASSWORD != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: ui

    env:
      CI: "true"
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run preview E2E QA
        id: run_e2e
        continue-on-error: true
        run: npm run test:e2e

      - name: Build QA bundle
        if: always()
        run: npm run qa:bundle

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accountant-bot-preview-qa
          if-no-files-found: warn
          path: |
            ui/test-results/
            ui/playwright-report/

      - name: Fail workflow if tests failed
        if: steps.run_e2e.outcome == 'failure'
        run: exit 1
