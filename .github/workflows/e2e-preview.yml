name: E2E Preview QA

on:
  pull_request:

permissions:
  contents: read

jobs:
  e2e-preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: ui

    env:
      CI: "true"
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check required E2E secrets
        id: check_secrets
        shell: bash
        run: |
          if [ -z "$E2E_BASE_URL" ] || [ -z "$E2E_TEST_EMAIL" ] || [ -z "$E2E_TEST_PASSWORD" ]; then
            echo "Missing one or more required secrets: E2E_BASE_URL, E2E_TEST_EMAIL, E2E_TEST_PASSWORD."
            echo "Skipping preview E2E QA for this pull request."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "All required E2E secrets are present."
          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: steps.check_secrets.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        if: steps.check_secrets.outputs.should_run == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.check_secrets.outputs.should_run == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run preview E2E QA
        id: run_e2e
        if: steps.check_secrets.outputs.should_run == 'true'
        continue-on-error: true
        run: npm run test:e2e

      - name: Build QA bundle
        if: always() && steps.check_secrets.outputs.should_run == 'true'
        run: npm run qa:bundle

      - name: Upload QA artifacts
        if: always() && steps.check_secrets.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: accountant-bot-preview-qa
          if-no-files-found: warn
          path: |
            ui/test-results/
            ui/playwright-report/

      - name: Fail workflow if tests failed
        if: steps.check_secrets.outputs.should_run == 'true' && steps.run_e2e.outcome == 'failure'
        run: exit 1
